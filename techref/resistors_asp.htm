<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Resistor Finder & Visualizer</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --card-bg: #ffffff;
            --primary-color: #2563eb;
            --text-color: #1f2937;
            /* Resistor Colors */
            --res-0: #000000; --res-1: #8b4513; --res-2: #ff0000;
            --res-3: #ff8c00; --res-4: #ffd700; --res-5: #008000;
            --res-6: #0000ff; --res-7: #9400d3; --res-8: #808080;
            --res-9: #ffffff; --res-10: #d4af37; --res-11: #c0c0c0;
            --res-body: #d2b48c;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            margin: 0;
            padding: 2rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h1 { margin-top: 0; color: var(--primary-color); }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1rem;
            align-items: end;
            margin-bottom: 2rem;
        }

        input, select, button {
            padding: 0.6rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 1rem;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }

        .visualizer-area {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 2rem;
            margin: 2rem 0;
            background: #f9fafb;
            border-radius: 8px;
            padding: 1rem;
            min-height: 120px; /* Prevent layout shift when empty */
            align-items: center;
        }

        .resistor-card { text-align: center; }

        /* SVG Resistor Styling */
        .resistor-svg { width: 200px; height: 80px; }
        .resistor-body { fill: var(--res-body); stroke: #bc9b6c; stroke-width: 1; }
        .wire { stroke: #4b5563; stroke-width: 4; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th, td {
            text-align: left;
            padding: 0.75rem;
            border-bottom: 1px solid #e5e7eb;
        }

        th { background: #f3f4f6; }
        
        /* Hover effect for clickable rows */
        tr.clickable-row { cursor: pointer; transition: background-color 0.2s; }
        tr.clickable-row:hover { background-color: #e5e7eb; }
        
        /* Highlight active row */
        tr.selected-row { background-color: #dbeafe; }

        .standard-values {
            font-size: 0.875rem;
            color: #6b7280;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-left: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Resistor Finder</h1>
    <p>Enter Ohms (e.g., 1k2, 4.7k, 1M) to visualize color bands and find parallel pairs.</p>

    <div class="controls">
        <div>
            <label>Resistance (Ω)</label><br>
            <input type="text" id="ohmInput" placeholder="e.g. 4k7" value="1k">
        </div>
        <div>
            <label>Tolerance</label><br>
            <select id="toleranceInput">
                <option value="1">1% (Brown)</option>
                <option value="2">2% (Red)</option>
                <option value="5" selected>5% (Gold)</option>
                <option value="10">10% (Silver)</option>
                <option value="20">20% (None)</option>
            </select>
        </div>
        <div>
            <label>Display Style</label><br>
            <select id="displayStyle">
                <option value="3" selected>4-Band (Standard)</option>
                <option value="4">5-Band (Precision)</option>
                </select>
        </div>
    </div>

    <div class="standard-values">
        <span id="e6Buttons"></span>
    </div>

    <div id="visualizer" class="visualizer-area">
        </div>

    <div id="results">
        </div>

</div>

<script>
    const COLORS = [
        '#000000', '#8b4513', '#ff0000', '#ff8c00', '#ffd700', 
        '#008000', '#0000ff', '#9400d3', '#808080', '#ffffff', 
        '#d4af37', '#c0c0c0', 'transparent'
    ];

    const TOLERANCE_MAP = { 1: 1, 2: 2, 5: 10, 10: 11, 20: 12 };

    const E6_BASE = [1.0, 1.5, 2.2, 3.3, 4.7, 6.8];
    // Generate E24 Series for calculation
    const E24_BASE = [1.0, 1.1, 1.2, 1.3, 1.5, 1.6, 1.8, 2.0, 2.2, 2.4, 2.7, 3.0, 3.3, 3.6, 3.9, 4.3, 4.7, 5.1, 5.6, 6.2, 6.8, 7.5, 8.2, 9.1];
    
    // Expanded ALL_RESISTORS range (e = -1 to 7) to cover 0.1 ohm up to ~91M ohm for better pair finding
    const ALL_RESISTORS = [];
    for (let e = -1; e <= 7; e++) {
        E24_BASE.forEach(v => ALL_RESISTORS.push(v * Math.pow(10, e)));
    }

    let inputTimeout = null; // Timer for debouncing the input
    let currentPairView = null; // Tracks if we are viewing a specific parallel pair

    const parseOhms = (input) => {
        input = String(input).trim().toLowerCase();
        let match;
        // Handles 1.2k, 1k2, 1200
        if (match = input.match(/^(\d+)?([rkm])(\d+)?$/)) {
            const mult = { r: 1, k: 1000, m: 1000000 }[match[2]];
            const major = match[1] || 0;
            const minor = match[3] || 0;
            return (parseFloat(major) + parseFloat('0.' + minor)) * mult;
        }
        if (match = input.match(/^(\d+\.?\d*)([km])?$/)) {
            const mult = { k: 1000, m: 1000000 }[match[2]] || 1;
            return parseFloat(match[1]) * mult;
        }
        return parseFloat(input);
    };

    // Helper to extract the mantissa and determine if it belongs to standard series
    const checkStandardness = (val) => {
        const rawMantissa = parseFloat(parseFloat(val).toExponential().split('e')[0]);
        const mantissa = Math.round(rawMantissa * 100) / 100;
        const isE6 = E6_BASE.includes(mantissa);
        const isE24 = E24_BASE.includes(mantissa);
        return { mantissa, isE6, isE24, isStandard: isE6 || isE24 };
    };

    const getBands = (val, bandCount) => {
        let sigFigs = bandCount === 3 ? 2 : 3;
        let exponent = Math.floor(Math.log10(val)) - (sigFigs - 1);
        let mantissa = Math.round(val / Math.pow(10, exponent));
        
        if (mantissa >= Math.pow(10, sigFigs)) {
            mantissa /= 10;
            exponent++;
        }

        const bands = String(mantissa).split('').map(Number);
        bands.push(exponent);
        return bands;
    };

    const createResistorSVG = (val, tolerance, bands) => {
        const bandColors = getBands(val, bands);
        const tolColor = COLORS[TOLERANCE_MAP[tolerance]];
        
        const { mantissa, isE6, isE24 } = checkStandardness(val);
        const standard = isE6 ? ' (E6 Standard)' : isE24 ? ' (E24 Standard)' : '(Non-standard)';
        
        const bandElements = bandColors.map((c, i) => 
            `<rect x="${40 + (i * 20)}" y="10" width="10" height="60" fill="${COLORS[c]}" />`
        ).join('');

        return `
            <div class="resistor-card">
                <div>${bands + 1} Band (${val.toFixed(2).replace(/\.00$/, '')} Ω)</div>
                <div>${standard} ${mantissa}</div>
                <svg class="resistor-svg" viewBox="0 0 200 80">
                    <line class="wire" x1="0" y1="40" x2="200" y2="40" />
                    <rect class="resistor-body" x="30" y="10" width="140" height="60" rx="10" />
                    ${bandElements}
                    <rect x="140" y="10" width="10" height="60" fill="${tolColor}" />
                </svg>
            </div>
        `;
    };

    // Renders the visualizer at the top. Either shows the "ideal" resistor or the selected pair.
    const renderVisualizer = () => {
        const val = parseOhms(document.getElementById('ohmInput').value);
        const tol = document.getElementById('toleranceInput').value;
        const bandCount = parseInt(document.getElementById('displayStyle').value);
        const visualizer = document.getElementById('visualizer');

        if (isNaN(val)) return;

        if (currentPairView) {
            // Show the two specific resistors from the list
            visualizer.innerHTML = createResistorSVG(currentPairView.r1, tol, bandCount) + 
                                   createResistorSVG(currentPairView.r2, tol, bandCount);
        } else {
            // Show the single requested resistor
            visualizer.innerHTML = createResistorSVG(val, tol, bandCount);
        }
    };

    // Helper triggered when the user clicks a row in the results table
    const selectPairForViewing = (r1, r2) => {
        currentPairView = { r1, r2 };
        renderVisualizer();
        
        // Highlight the selected row
        document.querySelectorAll('.clickable-row').forEach(row => row.classList.remove('selected-row'));
        event.currentTarget.classList.add('selected-row');

        // Scroll back to top so user sees the change
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    const findParallelPairs = () => {
        const target = parseOhms(document.getElementById('ohmInput').value);
        const tol = parseFloat(document.getElementById('toleranceInput').value);
        const resultsDiv = document.getElementById('results');
        
        let pairs = [];
        for (let i = 0; i < ALL_RESISTORS.length; i++) {
            for (let j = i; j < ALL_RESISTORS.length; j++) {
                const r1 = ALL_RESISTORS[i];
                const r2 = ALL_RESISTORS[j];
                const combined = (r1 * r2) / (r1 + r2);
                const diff = ((combined - target) / target) * 100;

                if (Math.abs(diff) <= tol) {
                    pairs.push({ r1, r2, combined, diff });
                }
            }
        }

        pairs.sort((a, b) => Math.abs(a.diff) - Math.abs(b.diff));
        pairs = pairs.slice(0, 10); // Top 10 matches

        if (pairs.length > 0) {
            // Automatically select and render the top pair instead of the impossible resistor
            currentPairView = { r1: pairs[0].r1, r2: pairs[0].r2 };
            renderVisualizer();

            let html = `<h3>Closest Parallel Matches (Top match previewed above)</h3>
                        <table><tr><th>R1</th><th>R2</th><th>Combined</th><th>Error</th></tr>`;
            pairs.forEach((p, index) => {
                const isSelected = index === 0 ? 'selected-row' : '';
                html += `<tr class="clickable-row ${isSelected}" onclick="selectPairForViewing(${p.r1}, ${p.r2})">
                    <td>${p.r1.toFixed(0)} Ω</td>
                    <td>${p.r2.toFixed(0)} Ω</td>
                    <td>${p.combined.toFixed(2)} Ω</td>
                    <td style="color: ${p.diff > 0 ? 'red' : 'blue'}">${p.diff.toFixed(2)}%</td>
                </tr>`;
            });
            html += `</table>`;
            resultsDiv.innerHTML = html;
        } else {
            resultsDiv.innerHTML = '<p>No suitable pairs found within this tolerance.</p>';
            currentPairView = null;
            renderVisualizer();
        }
    };

    // Main update function: Handles the typing delay, checks standard status, and triggers calculations
    const updateUI = () => {
        clearTimeout(inputTimeout);
        
        const val = parseOhms(document.getElementById('ohmInput').value);
        if (isNaN(val)) return;

        const { isStandard } = checkStandardness(val);

        if (isStandard) {
            // If it's a standard shelf value, just show the single resistor and clear the pairs list
            currentPairView = null;
            renderVisualizer();
            document.getElementById('results').innerHTML = '';
        } else {
            // If it's non-standard, clear the visualizer temporarily and calculate pairs
            document.getElementById('visualizer').innerHTML = '<div style="color: #6b7280;">Calculating best matches...</div>';
            document.getElementById('results').innerHTML = '';
            
            inputTimeout = setTimeout(() => {
                findParallelPairs();
            }, 500);
        }
    };

    // Event Listeners
    document.getElementById('ohmInput').addEventListener('input', updateUI);
    document.getElementById('toleranceInput').addEventListener('change', updateUI);
    document.getElementById('displayStyle').addEventListener('change', renderVisualizer); // Only redraw visualizer on style change

    // Initial Load
    const ButtonContainer = document.getElementById('e6Buttons');

    ButtonContainer.appendChild(document.createTextNode('E6 Values: '));
    E6_BASE.forEach(v => {
        const btn = document.createElement('button');
        btn.textContent = v;
        btn.style.margin = '2px';
        btn.onclick = () => {
            document.getElementById('ohmInput').value = v;
            updateUI();
        };
        ButtonContainer.appendChild(btn);
    });

    ButtonContainer.appendChild(document.createTextNode('E24 Values: '));
    E24_BASE.forEach(v => {
        const btn = document.createElement('button');
        btn.textContent = v;
        btn.style.margin = '2px';
        btn.onclick = () => {
            document.getElementById('ohmInput').value = v;
            updateUI();
        };
        ButtonContainer.appendChild(btn);
    });

    ButtonContainer.appendChild(document.createTextNode('Multipliers: '));
    ['Ω', 'k', 'M'].forEach(m => {
        const btn = document.createElement('button');
        btn.textContent = m;
        btn.style.margin = '2px';
        btn.onclick = () => {
            const ohmInput = document.getElementById('ohmInput');
            const v = parseFloat(ohmInput.value)
            ohmInput.value = v.toString() + m //*= m;
                updateUI();
        };
        ButtonContainer.appendChild(btn);
    });
    const btnx10 = document.createElement('button');
    btnx10.textContent = 'x10';
    btnx10.style.margin = '2px';
    btnx10.onclick = () => {
        const ohmInput = document.getElementById('ohmInput');
        const v = parseOhms(ohmInput.value) * 10;
        ohmInput.value = v;
        updateUI();
    };
    ButtonContainer.appendChild(btnx10);

    const btndiv10 = document.createElement('button');
    btndiv10.textContent = '/10';
    btndiv10.style.margin = '2px';
    btndiv10.onclick = () => {
        const ohmInput = document.getElementById('ohmInput');
        const v = parseOhms(ohmInput.value) / 10;
        ohmInput.value = v;
        updateUI();
    };
    ButtonContainer.appendChild(btndiv10);

    // Initial render
    updateUI();
</script>

</body>
</html>
